name: Build & Push Docker Image

on:
    push:
        branches:
            - main
    workflow_dispatch: {}

# Least privilege: this workflow authenticates to the registry via repo secrets,
# so the GITHUB_TOKEN only needs read access for checkout.
permissions:
    contents: read

env:
    REGISTRY: registry.oc.omedialab.com
    IMAGE_NAME: omedia-social-elk

jobs:
    build-and-push:
        runs-on: ubuntu-24.04

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Short SHA
              id: meta
              run: echo "sha=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Login to container registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}
                  username: ${{ secrets.REGISTRY_USER }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ steps.meta.outputs.sha }}
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
